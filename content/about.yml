title: About Me
description: Senior Frontend Engineer with 7+ years building large-scale Vue.js applications, multi-tenant ERP systems, and micro-frontend architectures in Bandung, Indonesia.
content: |
  Hi, I'm **Aditia Dwi Pratomo**, a Senior Frontend Engineer and UI Architect based in Bandung, Indonesia. For the past 7+ years, I've been deep in the Vue.js and Nuxt.js ecosystem — building everything from multi-tenant ERP systems to Point of Sale applications that handle real business-critical transactions.

  My day-to-day at **Sunwell System Technologies** involves architecting modular frontend systems that serve diverse industries — retail, automotive, logistics — each with their own complex business rules and customization needs. I led the development of **SoraPOS**, a modern Point of Sale system built with Nuxt 3 and Pinia, where I implemented comprehensive testing with Vitest and Playwright to ensure 99% reliability in transaction flows.

  ### What I Do Best

  I'm the person you call when you need to **migrate a massive legacy codebase without breaking production**. I spearheaded the migration of an entire ERP system from Vue 2 to Vue 2.7 with Composition API bridge, and upgraded Vuetify 1 to 2 — all while keeping the system running for active users. It's not glamorous work, but it's the kind of engineering that matters.

  I also have hands-on experience with **micro-frontend architecture** using Single-SPA, having integrated multiple frontend domains into a unified dashboard during my time at Moladin. Solving the domain separation challenges between different frontend modules taught me a lot about scalability and clean boundaries.

  ### My Approach

  I'm a **direct-to-code** person. Instead of spending weeks in Figma, I prototype directly in the browser — it's faster, more accurate, and lets me iterate with real data and real interactions. I handle the full development lifecycle: from rapid UI prototyping to CI/CD pipelines and VPS server management.

  My philosophy is simple: write code that the next developer can understand without a 30-minute explanation. Keep components modular, state management predictable, and business logic separated from presentation.

  ### Beyond the Code

  I graduated from **STMIK AMIK Bandung** with a degree in Information Technology, and I started my career in software engineering at **SMK Negeri 4 Bandung**. When I'm not writing Vue components, I'm probably experimenting with Golang, tinkering with server configurations, or exploring new ways to make web applications faster.

  Feel free to check out my [projects](/projects) or [reach out](mailto:aditgege@gmail.com) if you want to collaborate on something interesting.
