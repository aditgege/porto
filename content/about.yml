title: About
description: Frontend engineer in Bandung, 7+ years deep in Vue and Nuxt. I build multi-tenant ERPs, POS systems, and the unglamorous legacy migrations nobody volunteers for.
content: |
  I'm **Aditia Dwi Pratomo**, a frontend engineer based in Bandung, Indonesia. For the past 7+ years I've been deep in the Vue and Nuxt ecosystem — building things people actually use to run their business: multi-tenant ERPs, POS terminals at the front of stores, internal dashboards stitched together from a dozen teams.

  Most of my time goes to **Sunwell System Technologies**, where I architect modular frontend systems that serve retail, automotive, and logistics clients — each with their own quirks. I led **SoraPOS**, a Nuxt 3 + Pinia POS system, and wired up Vitest and Playwright so payment flows can't silently regress.

  ### What I'm good at

  Migrating massive legacy codebases without breaking production. I moved an entire ERP from Vue 2 to Vue 2.7 + Composition API, then upgraded Vuetify 1 → 2, while real users were still hitting the system every minute. Not glamorous, but it's the work that keeps companies moving.

  I've also built micro-frontend systems with Single-SPA at Moladin — figuring out how to let separate product teams ship independently without users feeling the seams.

  ### How I work

  **Direct to code.** I don't do weeks in Figma. I prototype in the browser with real data and real interactions, because that's the only place truth lives. I handle the full lifecycle — UI, CI/CD, and the VPS the thing eventually runs on.

  My rule of thumb: write code the next person can read in a single sitting. Modular components, predictable state, business logic kept far away from presentation.

  ### Outside the editor

  Graduated from **STMIK AMIK Bandung** (IT). Started teaching software engineering at **SMK Negeri 4 Bandung**. When I'm not in Vue I'm probably writing a bit of Go, tuning a server, or chasing a small idea I'll post about later.

  Want to build something? [Get in touch](mailto:aditgege@gmail.com) or [poke around the projects](/projects).
