about:
  title: About Me
  description: |
    Frontend engineer based in Bandung, Indonesia. Seven-plus years deep in Vue and Nuxt — mostly
    architecting multi-tenant ERPs, POS apps, and micro-frontends with Single-SPA. I prefer
    prototyping straight in the browser over weeks in Figma. I run my own CI/CD, deploy to my own
    VPS, and write code the next person doesn't curse me for.

