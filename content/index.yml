about:
  title: About Me
  description: |
    Frontend engineer based in Bandung, Indonesia with 7+ years of hands-on experience in the Vue.js and Nuxt.js ecosystem.
    I specialize in architecting multi-tenant ERP systems, building POS applications, and implementing micro-frontend architectures with Single-SPA.
    My approach is practical — I go direct-to-code for UI prototyping, handle CI/CD pipelines, and manage VPS deployments.
    I care about writing code that's maintainable, performant, and doesn't make the next developer curse my name.

