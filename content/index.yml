faq:
  title: "Frequently Asked Questions"
  description: "Common questions about my work and expertise."
  categories:
    - title: "Technical Expertise"
      questions:
        - label: "What's your primary tech stack?"
          content: |
            Vue.js (2 & 3) and Nuxt.js (2 & 3) are my bread and butter. I work with Pinia for state management, Vitest and Playwright for testing, Tailwind CSS and Vuetify for UI, and occasionally Golang for backend services.
            I also have experience with React.js, Single-SPA for micro-frontends, Laravel, and Strapi CMS.
        - label: "What kind of projects do you specialize in?"
          content: |
            I specialize in large-scale multi-tenant ERP systems, Point of Sale applications, and micro-frontend architectures.
            Most of my work involves complex business logic — handling multi-tenancy, modular architectures for different industries (retail, automotive, logistics), and migrating legacy systems to modern frameworks.
        - label: "Do you handle deployment and DevOps?"
          content: |
            Yes. I manage end-to-end frontend development including CI/CD pipelines and deploying multi-app environments on VPS servers.
            I believe a frontend engineer should understand the full lifecycle — from writing code to getting it running in production.
    - title: "Working Together"
      questions:
        - label: "Are you available for freelance work?"
          content: |
            Selectively, yes. I'm open to projects that involve complex frontend architecture, Vue/Nuxt development, or legacy system migrations.
            I prefer meaningful projects with real technical challenges over template-based work.
        - label: "What's your approach to new projects?"
          content: |
            I start by understanding the business requirements and existing codebase. I go direct-to-code for UI prototyping rather than spending weeks in design tools.
            For architecture, I focus on maintainability and scalability — especially important for multi-tenant systems where one codebase serves many clients.
        - label: "Where are you based?"
          content: |
            Bandung, Indonesia. I've worked with both local companies and remote teams across Indonesia.
            I'm comfortable with async communication and have experience collaborating with distributed teams.
